<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Viewing App</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #222; }
        
        .container {
            width: 100vw;
            height: 100vh;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- REPLACE THE URL BELOW with your actual GitHub Pages link -->
        <iframe 
            src="https://activline.vercel.app" 
            allow="camera *; microphone *; fullscreen *" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
